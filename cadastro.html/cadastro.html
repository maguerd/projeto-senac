<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>

    </header>
    <nav></nav>
    <main>
        <fieldset>
            <legend>
                Formulario
            </legend>
            <form action="https://www.uberlandia.mg.gov.br/">
                <label>
                    Nome:
                </label>
                <input type="text" required placeholder="Digite seu nome">
                <br>
                <label>
                    Email:
                </label>
                <input type="email">
                <br>
                <label>
                    Idade:
                </label>
                <input type="number">
                <br>
                <label>
                    Data de Nascimento:
                </label>
                <input type="date">
                <br>
                <label>
                    Preferencia do horario:
                </label>
                <input type="radio" name="periodo"> Noturno
                <input type="radio" name="periodo"> Diurno

                <br>

                <label>Preferência de Curso:</label>
                <input type="checkbox"> T.I
                <input type="checkbox"> Direito
                <input type="checkbox"> Estatística

                <br>

                <label>Senha:</label>
                <input type="password">

                <br>

                <label>
                    Satisfação:
                </label>
                
                <input type="range" min="0" max="5">

                <br>

                <label>
                    Selecione seu estado:
                </label>

                <select>
                    <option>MG</option>
                    <option>BA</option>
                    <option>RS</option>
                </select>

                <br>


                <input type="reset" value="Resetar">
                <input type="submit" >
            </form>
        </fieldset>
    </main>
    <footer></footer>
</body>
</html>
